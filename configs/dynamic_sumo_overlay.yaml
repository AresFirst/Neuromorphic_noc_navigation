map:
  root_dir: datasets/MoSTScenario-master
  netxml_path: null
  sumocfg_path: datasets/MoSTScenario-master/scenario/most.sumocfg
  require_sumo_load_check: true

planning:
  start: null
  target: null
  seed: 3
  max_nodes: 320
  max_steps: 12
  replan_interval: 2
  min_delay_ms: 1
  max_delay_ms: 10
  use_travel_time_if_speed_available: true

traffic:
  seed: 11
  num_vehicles: 180
  min_speed: 0.16
  max_speed: 0.38
  num_hotspots: 8
  hotspot_vehicle_fraction: 0.55

congestion:
  congested_density: 0.55
  blocked_density: 1.05
  delay_factor: 3.0
  vehicles_per_lane_capacity: 3.0
  threshold_penalty_ms: 2.0

loihi:
  config_path: configs/brian2loihi.yaml

visualization:
  save_frames: true
  max_background_edges: null
  zoom_to_route: true
  wavefront_frames_per_replan: 5
  max_wavefront_replans: 3

output:
  output_dir: results/dynamic_sumo_overlay
