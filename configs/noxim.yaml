# NoC (Network-on-Chip) 仿真配置文件
# 用于 run_noc_validation.py (Week6 实验) 和 noc/ 模块，
# 控制 Noxim 周期精确模拟器的参数、core 映射策略和流量生成

# ---- NoC Mesh 拓扑参数 ----
# 2D Mesh 的行数和列数。mesh_rows × mesh_cols = 物理 core 总数
# 例如 8×8 = 64 个 core，每个 core 可以承载多个神经元
mesh_rows: 8
mesh_cols: 8

# ---- Core 映射策略 ----
# 将图节点 (SNN 神经元) 分配到物理 core 的策略列表
# run_noc_validation.py 会对每个策略分别测试并对比性能
# - random:    每个神经元随机分配到一个 core (基线对照)
# - community: 按图节点的 region 属性分组，同社区尽量放在相邻 core
# - topology:  利用节点的 (x, y) 坐标，按空间最近原则映射到 core
mapping_strategies:
  - random
  - community
  - topology

# ---- Noxim 路径配置 ----
# Noxim 源码根目录
noxim_root: ~/code/noxim-master
# Noxim 可执行文件路径 (需要先编译: make)
noxim_bin: ~/code/noxim-master/bin/noxim
# Noxim 默认配置文件 (定义路由算法、缓冲区大小、仲裁策略等)
noxim_config_path: ~/code/noxim-master/config_examples/default_configMeshNoHUB.yaml
# Noxim 功耗模型配置文件
noxim_power_path: ~/code/noxim-master/bin/power.yaml

# ---- 流量参数 ----
# 每个数据包的大小 (flits，flow control units)
# 较小的包 (2 flits) 模拟 SNN 脉冲的轻量通信特性
noxim_packet_size: 2
# 预热周期数：仿真开始后忽略前 N 个周期的统计 (排除冷启动影响)
noxim_warmup_cycles: 0
# 仿真余量周期数：所有包注入完成后额外运行的周期数
# 确保最后一个包也有足够时间到达目的地
noxim_simulation_margin_cycles: 200

# 随机种子
seed: 0
