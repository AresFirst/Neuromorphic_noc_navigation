# 图生成配置文件
# 用于 run_graph_baseline.py (Week2 实验)，控制复杂拓扑图的生成参数和 Dijkstra 基线测试设置

# 拓扑类型: community / random_geometric / small_world / scale_free
# - community:     节点分簇，簇内密集连接、簇间稀疏连接，模拟模块化 NoC 架构
# - random_geometric: 节点随机分布在单位方形内，距离近的节点按概率连边
# - small_world:   环状近邻连接 + 随机重连，具有"小世界"特性（高聚类、短路径）
# - scale_free:    BA 无标度网络，新节点按度优先连接，模拟异构 NoC 拓扑
graph_type: community

# 图中节点总数。数值越大图越复杂，SNN 波前传播时间越长，Noxim 仿真负载越大
num_nodes: 200

# 随机种子，保证图生成和起止点采样的可复现性
seed: 0

# Dijkstra 基线测试中随机采样的 (起点, 终点) 对数
num_pairs: 20

# 边延迟的最小值 (毫秒)。对应 SNN 中最短突触延迟，也对应 NoC 中最近邻通信延迟
min_delay_ms: 1

# 边延迟的最大值 (毫秒)。对应 SNN 中最长突触延迟，也对应 NoC 中最远通信延迟
# 边延迟 = 在 min 和 max 之间按边代价 (base_cost) 线性映射
max_delay_ms: 10
